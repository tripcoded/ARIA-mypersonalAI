services:
  - type: web
    name: aria-backend
    runtime: python
    plan: free
    rootDir: backend
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DATA_DIR
        value: ./storage
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_MAX_FILES
        value: "150"
      - key: GITHUB_MAX_FILE_BYTES
        value: "200000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
